<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crowmax Joinery</title>
    <meta name="description" content="Contact Crowmax Joinery by email.">
    <style>
        :root {
            color-scheme: light;
            --background: #f4f1ea;
            --card: #ffffff;
            --text: #1f2933;
            --muted: #5f6b76;
            --accent: #7a4f2a;
            --accent-hover: #603d20;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            background:
                linear-gradient(rgba(244, 241, 234, 0.94), rgba(244, 241, 234, 0.94)),
                repeating-linear-gradient(90deg,
                    transparent 0,
                    transparent 28px,
                    rgba(122, 79, 42, 0.05) 29px);
            color: var(--text);
        }

        main {
            width: min(100%, 620px);
            padding: 48px 36px;
            text-align: center;
            background: var(--card);
            border: 1px solid rgba(31, 41, 51, 0.08);
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(31, 41, 51, 0.10);
        }

        .mark {
            width: 58px;
            height: 58px;
            margin: 0 auto 22px;
            display: grid;
            place-items: center;
            border-radius: 14px;
            background: var(--accent);
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(2rem, 5vw, 3rem);
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 auto 28px;
            max-width: 470px;
            color: var(--muted);
            font-size: 1.08rem;
            line-height: 1.65;
        }

        a.button {
            display: inline-block;
            padding: 14px 22px;
            border-radius: 10px;
            background: var(--accent);
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        a.button:hover,
        a.button:focus {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .email {
            margin-top: 18px;
            font-size: 0.95rem;
            color: var(--muted);
            word-break: break-word;
        }

        footer {
            margin-top: 34px;
            font-size: 0.82rem;
            color: #8a949d;
        }
    </style>
</head>

<body>
    <main>
        <div class="mark" aria-hidden="true">CJ</div>
        <h1>Crowmax Joinery</h1>
        <p>
            For enquiries, quotations, or further information, please contact Sam by email.
        </p>

        <a class="button" href="mailto:samcrow@crowmaxjoinery.co.uk">
            Email Sam
        </a>

        <div class="email">samcrow@crowmaxjoinery.co.uk</div>

        <footer>&copy; 2026 Crowmax Joinery</footer>
    </main>
</body>

</html>
